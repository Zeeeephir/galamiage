<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎶 Request a Track</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060608;
      --surface: #0e0e14;
      --card: #13131c;
      --border: #1e1e2e;
      --neon-pink: #ff2d78;
      --neon-cyan: #00f0ff;
      --neon-purple: #b94eff;
      --text: #e8e8f0;
      --muted: #5a5a7a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,45,120,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(0,240,255,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(185,78,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,45,120,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,120,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 52px;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(255,45,120,0.5);
      animation: pulse-logo 3s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 0 24px rgba(255,45,120,0.5); }
      50% { box-shadow: 0 0 48px rgba(255,45,120,0.9), 0 0 80px rgba(255,45,120,0.3); }
    }

    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(48px, 8vw, 88px);
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(255,45,120,0.4));
    }

    .subtitle {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Form card */
    .form-card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      position: relative;
      overflow: hidden;
      margin-bottom: 48px;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
    }

    .form-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--neon-cyan);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--neon-pink);
      box-shadow: 0 0 0 3px rgba(255,45,120,0.15);
    }

    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(255,45,120,0.35);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,45,120,0.55);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--neon-cyan);
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 14px;
      color: var(--neon-cyan);
      box-shadow: 0 0 24px rgba(0,240,255,0.2);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Queue section */
    .queue-section {
      width: 100%;
      max-width: 520px;
    }

    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .queue-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--neon-purple);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .count-badge {
      background: rgba(185,78,255,0.2);
      border: 1px solid rgba(185,78,255,0.4);
      color: var(--neon-purple);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .track-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: slide-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
      transition: border-color 0.2s;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .track-item:hover { border-color: rgba(185,78,255,0.3); }

    .track-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      color: var(--border);
      min-width: 32px;
      line-height: 1;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .track-requester {
      font-size: 12px;
      color: var(--neon-cyan);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .track-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon-pink);
      box-shadow: 0 0 10px var(--neon-pink);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

    /* Scanning bar animation on live */
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--neon-pink);
    }

    .live-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--neon-pink);
      animation: blink 1s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo-bar">
        <div class="logo-icon">🎵</div>
      </div>
      <h1>REQUEST<br>A TRACK</h1>
      <p class="subtitle">Proposez votre morceau au DJ</p>
    </header>

    <div class="form-card">
      <div class="form-title">🎤 Votre requête</div>

      <div class="field">
        <label>Votre prénom</label>
        <input type="text" id="req-name" placeholder="Ex: Lucas" maxlength="30"/>
      </div>
      <div class="field">
        <label>Artiste</label>
        <input type="text" id="req-artist" placeholder="Ex: Drake" maxlength="60"/>
      </div>
      <div class="field">
        <label>Titre du morceau</label>
        <input type="text" id="req-track" placeholder="Ex: God's Plan" maxlength="80"/>
      </div>

      <button class="submit-btn" onclick="submitRequest()">
        ⚡ ENVOYER AU DJ
      </button>
    </div>

    <div class="queue-section">
      <div class="queue-header">
        <div class="queue-title">📋 File d'attente</div>
        <span class="live-dot">Live</span>
      </div>
      <div id="queue-list">
        <div class="empty-state">
          <div class="empty-icon">🎧</div>
          <div>Aucune requête pour l'instant.<br>Soyez le premier !</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔧 REMPLACE CES VALEURS PAR TES INFOS FIREBASE
    const firebaseConfig = {
      apiKey: "VOTRE_API_KEY",
      authDomain: "VOTRE_PROJECT.firebaseapp.com",
      databaseURL: "https://VOTRE_PROJECT-default-rtdb.firebaseio.com",
      projectId: "VOTRE_PROJECT",
      storageBucket: "VOTRE_PROJECT.appspot.com",
      messagingSenderId: "VOTRE_ID",
      appId: "VOTRE_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const requestsRef = ref(db, 'requests');

    // Submit
    window.submitRequest = function() {
      const name   = document.getElementById('req-name').value.trim();
      const artist = document.getElementById('req-artist').value.trim();
      const track  = document.getElementById('req-track').value.trim();

      if (!name || !artist || !track) {
        showToast('⚠️ Remplis tous les champs !', '#ff2d78');
        return;
      }

      push(requestsRef, {
        name, artist, track,
        timestamp: Date.now()
      }).then(() => {
        document.getElementById('req-name').value = '';
        document.getElementById('req-artist').value = '';
        document.getElementById('req-track').value = '';
        showToast('✅ Requête envoyée au DJ !', '#00f0ff');
      }).catch(() => {
        showToast('❌ Erreur, réessaie.', '#ff2d78');
      });
    };

    // Real-time listener
    onValue(requestsRef, (snapshot) => {
      const list = document.getElementById('queue-list');
      const data = snapshot.val();

      if (!data) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎧</div>
            <div>Aucune requête pour l'instant.<br>Soyez le premier !</div>
          </div>`;
        return;
      }

      const items = Object.entries(data)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => a.timestamp - b.timestamp);

      list.innerHTML = items.map((item, i) => `
        <div class="track-item">
          <div class="track-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="track-info">
            <div class="track-name">${esc(item.track)}</div>
            <div class="track-artist">${esc(item.artist)}</div>
            <div class="track-requester">par ${esc(item.name)}</div>
          </div>
          <div class="track-dot"></div>
        </div>
      `).join('');
    });

    function esc(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showToast(msg, color = '#00f0ff') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.color = color;
      t.style.borderColor = color;
      t.style.boxShadow = `0 0 24px ${color}33`;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitRequest();
    });
  </script>
</body>
</html>
