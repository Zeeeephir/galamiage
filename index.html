<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gala Miage — Request a Track</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #04040a;
      --surface: #0a0a12;
      --card: #0f0f1a;
      --card2: #141424;
      --border: #1c1c30;
      --border2: #252540;
      --pink: #ff2060;
      --cyan: #00e5ff;
      --purple: #a855f7;
      --text: #eeeef5;
      --muted: #52527a;
      --muted2: #3a3a5c;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }

    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      animation: float-orb 12s ease-in-out infinite;
    }
    .orb1 { width: 600px; height: 600px; background: var(--pink);   top: -200px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 500px; height: 500px; background: var(--cyan);   bottom: -150px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 400px; height: 400px; background: var(--purple); top: 40%; left: 50%; animation-delay: -8s; }

    @keyframes float-orb {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(30px,-40px) scale(1.05); }
      66%       { transform: translate(-20px,20px) scale(0.95); }
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,32,96,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,32,96,0.035) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px 100px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fade-up 0.8s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .school-logo-wrap { margin-bottom: 28px; }

    .school-logo {
      height: 90px; max-width: 260px;
      object-fit: contain;
      filter: brightness(1.1) drop-shadow(0 0 20px rgba(255,32,96,0.35));
      border-radius: 12px;
    }

    .school-logo-fallback {
      display: none;
      width: 80px; height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto;
      box-shadow: 0 0 40px rgba(255,32,96,0.4);
    }

    .event-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,32,96,0.1);
      border: 1px solid rgba(255,32,96,0.25);
      border-radius: 40px;
      padding: 6px 18px;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--pink); margin-bottom: 20px;
    }

    .event-tag-dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: var(--pink);
      animation: blink 1.2s ease-in-out infinite;
    }

    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(64px, 12vw, 120px);
      letter-spacing: 8px; line-height: 0.9;
      background: linear-gradient(135deg, #ffffff 0%, var(--pink) 50%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 40px rgba(255,32,96,0.3));
    }

    .h1-sub {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(28px, 5vw, 52px);
      letter-spacing: 10px; color: var(--cyan);
      margin-top: 2px;
      filter: drop-shadow(0 0 20px rgba(0,229,255,0.6));
    }

    .subtitle {
      font-size: 13px; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted);
      margin-top: 18px;
    }

    .divider {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 18px auto 0;
    }

    /* FORM */
    .form-card {
      width: 100%; max-width: 540px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 40px;
      position: relative; overflow: hidden;
      margin-bottom: 48px;
      animation: fade-up 0.8s 0.2s ease both;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    .form-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--purple), var(--cyan));
    }

    .form-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px; letter-spacing: 3px; color: var(--cyan);
      margin-bottom: 32px;
      display: flex; align-items: center; gap: 10px;
    }

    .field { margin-bottom: 22px; }

    label {
      display: block;
      font-size: 10px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 15px 20px;
      color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    input::placeholder { color: var(--muted2); }

    input:focus {
      background: #0d0d1f;
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,32,96,0.12), 0 0 24px rgba(255,32,96,0.07);
    }

    .submit-btn {
      width: 100%; margin-top: 10px;
      padding: 18px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--pink) 0%, #c020a0 50%, var(--purple) 100%);
      color: #fff;
      font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 4px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 6px 30px rgba(255,32,96,0.45);
    }

    .submit-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 60%);
      pointer-events: none;
    }

    .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 44px rgba(255,32,96,0.65); }
    .submit-btn:active { transform: translateY(0); }

    /* QUEUE */
    .queue-section {
      width: 100%; max-width: 540px;
      animation: fade-up 0.8s 0.4s ease both;
    }

    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }

    .queue-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px; letter-spacing: 3px; color: var(--purple);
    }

    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,32,96,0.1);
      border: 1px solid rgba(255,32,96,0.2);
      border-radius: 20px; padding: 5px 14px;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--pink);
    }

    .track-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 22px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
      animation: slide-in 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
      transition: border-color 0.2s, transform 0.2s;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .track-item:hover { border-color: rgba(168,85,247,0.35); transform: translateX(5px); }

    .track-num {
      font-family: 'Bebas Neue', cursive; font-size: 30px;
      color: var(--muted2); min-width: 36px; line-height: 1;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .track-artist { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .track-requester {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 8px;
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.14);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; color: var(--cyan); letter-spacing: 0.5px;
    }

    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%; background: var(--pink);
      box-shadow: 0 0 10px var(--pink);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.35; }
    .empty-text { font-size: 14px; letter-spacing: 0.5px; line-height: 1.8; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card2);
      border: 1px solid var(--cyan);
      border-radius: 14px; padding: 14px 28px;
      font-size: 14px; color: var(--cyan);
      box-shadow: 0 8px 40px rgba(0,229,255,0.2);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 200; white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* FOOTER */
    footer {
      margin-top: 72px; text-align: center;
      color: var(--muted2); font-size: 12px; letter-spacing: 1.5px;
      animation: fade-up 0.8s 0.6s ease both;
    }
    footer .nn { color: var(--cyan); font-weight: 600; letter-spacing: 2px; }
    .heart { display: inline-block; animation: heartbeat 1.4s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100%{transform:scale(1)} 14%{transform:scale(1.3)} 28%{transform:scale(1)} 42%{transform:scale(1.15)} 70%{transform:scale(1)}
    }

    @media (max-width: 560px) {
      .form-card { padding: 28px 18px; }
    }
  </style>
</head>
<body>

  <div class="bg-layer">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="grid-overlay"></div>
  <div class="scanlines"></div>

  <div class="wrapper">

    <header>
      <!-- 🔧 LOGO : mets ton fichier logo.png dans le même dossier que ce fichier HTML sur GitHub -->
      <div class="school-logo-wrap">
        <img
          class="school-logo"
          src="logo.png"
          alt="Logo école"
          onerror="this.style.display='none'; document.querySelector('.school-logo-fallback').style.display='flex';"
        />
        <div class="school-logo-fallback">🎓</div>
      </div>

      <div class="event-tag">
        <span class="event-tag-dot"></span>
        Soirée en direct
      </div>

      <h1>GALA</h1>
      <div class="h1-sub">MIAGE</div>
      <p class="subtitle">Proposez votre morceau au DJ</p>
      <div class="divider"></div>
    </header>

    <div class="form-card">
      <div class="form-title">🎤 Votre requête</div>

      <div class="field">
        <label>Votre prénom</label>
        <input type="text" id="req-name" placeholder="Ex : Lucas" maxlength="30"/>
      </div>
      <div class="field">
        <label>Artiste</label>
        <input type="text" id="req-artist" placeholder="Ex : Drake" maxlength="60"/>
      </div>
      <div class="field">
        <label>Titre du morceau</label>
        <input type="text" id="req-track" placeholder="Ex : God's Plan" maxlength="80"/>
      </div>

      <button class="submit-btn" onclick="submitRequest()">
        ⚡ ENVOYER AU DJ
      </button>
    </div>

    <div class="queue-section">
      <div class="queue-header">
        <div class="queue-title">📋 File d'attente</div>
        <div class="live-badge">
          <span class="pulse-dot"></span>
          Live
        </div>
      </div>
      <div id="queue-list">
        <div class="empty-state">
          <div class="empty-icon">🎧</div>
          <div class="empty-text">Aucune requête pour l'instant.<br>Soyez le premier à proposer un son !</div>
        </div>
      </div>
    </div>

    <footer>
      Fait avec <span class="heart">❤️</span> par <span class="nn">NoisyNeighbors</span><br>
      <span style="opacity:0.4; font-size:11px; margin-top:6px; display:block;">Gala Miage &mdash; Tous droits réservés</span>
    </footer>

  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTGFIBqM0D8IfxdcRQeffAAnSz138RrwQ",
      authDomain: "galamiage-22260.firebaseapp.com",
      databaseURL: "https://galamiage-22260-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "galamiage-22260",
      storageBucket: "galamiage-22260.firebasestorage.app",
      messagingSenderId: "1004747524329",
      appId: "1:1004747524329:web:5f8002f086e8c8c2e7c878",
      measurementId: "G-10LWNY8TFR"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const requestsRef = ref(db, 'requests');

    window.submitRequest = function() {
      const name   = document.getElementById('req-name').value.trim();
      const artist = document.getElementById('req-artist').value.trim();
      const track  = document.getElementById('req-track').value.trim();

      if (!name || !artist || !track) {
        showToast('⚠️ Remplis tous les champs !', '#ff2060');
        return;
      }

      push(requestsRef, { name, artist, track, timestamp: Date.now() })
        .then(() => {
          document.getElementById('req-name').value   = '';
          document.getElementById('req-artist').value = '';
          document.getElementById('req-track').value  = '';
          showToast('✅ Requête envoyée au DJ !', '#00e5ff');
        })
        .catch(() => showToast('❌ Erreur, réessaie.', '#ff2060'));
    };

    onValue(requestsRef, (snapshot) => {
      const list = document.getElementById('queue-list');
      const data = snapshot.val();

      if (!data) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎧</div>
            <div class="empty-text">Aucune requête pour l'instant.<br>Soyez le premier à proposer un son !</div>
          </div>`;
        return;
      }

      const items = Object.entries(data)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => a.timestamp - b.timestamp);

      list.innerHTML = items.map((item, i) => `
        <div class="track-item" style="animation-delay:${i * 0.05}s">
          <div class="track-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="track-info">
            <div class="track-name">${esc(item.track)}</div>
            <div class="track-artist">${esc(item.artist)}</div>
            <div class="track-requester">👤 ${esc(item.name)}</div>
          </div>
          <div class="pulse-dot"></div>
        </div>
      `).join('');
    });

    function esc(str) {
      return String(str).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showToast(msg, color = '#00e5ff') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.color = color;
      t.style.borderColor = color;
      t.style.boxShadow = `0 8px 40px ${color}33`;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitRequest();
    });
  </script>
</body>
</html>
